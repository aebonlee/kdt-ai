<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <!-- 소프트맥스 도해 — 점수(logits)를 확률로 정규화, kdt-ai 다크 IDE 톤 -->
  <rect width="760" height="420" rx="14" fill="#0d1020"/>
  <text x="30" y="42" fill="#e6e9f5" font-size="20" font-weight="800">소프트맥스(Softmax) — 점수를 '합이 1인 확률'로</text>
  <text x="30" y="66" fill="#8a93b8" font-size="13">다중 클래스 분류의 출력층 · 언어모델의 다음 토큰 확률 · Attention 가중치에 등장</text>

  <!-- 좌: 출력층 점수(logits) -->
  <text x="60" y="110" fill="#8a93b8" font-size="14" font-weight="700">출력층 점수 (logits)</text>
  <g font-size="14" fill="#e6e9f5">
    <text x="60" y="152">🐶 강아지</text>
    <rect x="150" y="136" width="140" height="22" rx="5" fill="#3a4370"/>
    <text x="298" y="152" fill="#c3c8e6">2.0</text>
    <text x="60" y="196">🐱 고양이</text>
    <rect x="150" y="180" width="70" height="22" rx="5" fill="#3a4370"/>
    <text x="298" y="196" fill="#c3c8e6">1.0</text>
    <text x="60" y="240">🐯 호랑이</text>
    <rect x="150" y="224" width="7" height="22" rx="3" fill="#3a4370"/>
    <text x="298" y="240" fill="#c3c8e6">0.1</text>
  </g>
  <text x="60" y="282" fill="#8a93b8" font-size="12.5">크기 제각각 · 음수도 가능 · 합이 1이 아님</text>

  <!-- 중앙: softmax 상자 -->
  <rect x="336" y="140" width="132" height="112" rx="12" fill="#161b33" stroke="#e8b64c" stroke-width="1.6"/>
  <text x="402" y="176" text-anchor="middle" fill="#e8b64c" font-size="16" font-weight="800">softmax</text>
  <text x="402" y="206" text-anchor="middle" fill="#e6e9f5" font-size="15">eᶻⁱ / Σ eᶻʲ</text>
  <text x="402" y="232" text-anchor="middle" fill="#8a93b8" font-size="12">지수화 → 정규화</text>
  <path d="M 310 196 l 20 0 m -8 -7 l 8 7 l -8 7" stroke="#e8b64c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 474 196 l 20 0 m -8 -7 l 8 7 l -8 7" stroke="#e8b64c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 우: 확률 -->
  <text x="512" y="110" fill="#8a93b8" font-size="14" font-weight="700">확률 (0~1, 총합 = 1)</text>
  <g font-size="14" fill="#e6e9f5">
    <text x="512" y="152">🐶</text>
    <rect x="544" y="136" width="132" height="22" rx="5" fill="#4f9c7e"/>
    <text x="684" y="152" fill="#7ddba8" font-weight="800">0.66</text>
    <text x="512" y="196">🐱</text>
    <rect x="544" y="180" width="48" height="22" rx="5" fill="#4f9c7e" fill-opacity="0.75"/>
    <text x="684" y="196" fill="#7ddba8" font-weight="800">0.24</text>
    <text x="512" y="240">🐯</text>
    <rect x="544" y="224" width="20" height="22" rx="5" fill="#4f9c7e" fill-opacity="0.5"/>
    <text x="684" y="240" fill="#7ddba8" font-weight="800">0.10</text>
  </g>
  <text x="512" y="282" fill="#7ddba8" font-size="13" font-weight="800">0.66 + 0.24 + 0.10 = 1 ✓</text>

  <!-- 하단: 오늘 수업 연결 -->
  <rect x="30" y="312" width="700" height="76" rx="10" fill="#161b33"/>
  <text x="52" y="340" fill="#e8b64c" font-size="13.5" font-weight="800">오늘 수업에서 소프트맥스가 나오는 두 곳</text>
  <text x="52" y="364" fill="#c3c8e6" font-size="13">① 언어모델 출력층 — 어휘 전체에 대한 '다음 토큰' 확률 분포를 만들 때</text>
  <text x="52" y="382" fill="#c3c8e6" font-size="13">② Self-Attention — QKᵀ/√d_k 점수를 각 행 합=1인 attention 가중치로 바꿀 때</text>
</svg>
