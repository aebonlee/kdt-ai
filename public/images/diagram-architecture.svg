<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#0d1020"/>
  <text x="30" y="40" fill="#e8eaf0" font-size="18" font-weight="800">아키텍처 — 시스템이 무엇으로 구성되나</text>
  <text x="30" y="64" fill="#9aa4bd" font-size="13">위=사용자 · 가운데=우리가 만든 것(실선) · 아래=데이터와 빌려 쓰는 것(점선)</text>

  <!-- Layer 1: 사용자 -->
  <rect x="30" y="90" width="840" height="62" rx="10" fill="#12141c" stroke="#3a3f4e" stroke-width="1.5"/>
  <text x="46" y="115" fill="#8792ad" font-size="11" font-weight="700">① 사용자 계층</text>
  <rect x="330" y="105" width="240" height="36" rx="8" fill="#1a1e2a" stroke="#5d6478" stroke-width="1.5"/>
  <text x="450" y="128" fill="#c4c9d8" font-size="13" font-weight="700" text-anchor="middle">사용자 · 웹 화면 (요청 입력)</text>

  <!-- Layer 2: 우리 시스템 -->
  <rect x="30" y="172" width="840" height="128" rx="10" fill="#0e2028" stroke="#22d3ee" stroke-width="2"/>
  <text x="46" y="196" fill="#22d3ee" font-size="11" font-weight="800">② 우리가 만든 시스템 — CrewAI Crew</text>

  <rect x="60" y="210" width="180" height="72" rx="9" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="150" y="238" fill="#22d3ee" font-size="13" font-weight="800" text-anchor="middle">Agent 1 · 분석</text>
  <text x="150" y="258" fill="#9aa4bd" font-size="11" text-anchor="middle">role / goal / backstory</text>
  <text x="150" y="274" fill="#9aa4bd" font-size="11" text-anchor="middle">Task 1</text>

  <rect x="270" y="210" width="180" height="72" rx="9" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="360" y="238" fill="#22d3ee" font-size="13" font-weight="800" text-anchor="middle">Agent 2 · 생성</text>
  <text x="360" y="258" fill="#9aa4bd" font-size="11" text-anchor="middle">role / goal / backstory</text>
  <text x="360" y="274" fill="#9aa4bd" font-size="11" text-anchor="middle">Task 2</text>

  <rect x="480" y="210" width="180" height="72" rx="9" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="570" y="238" fill="#22d3ee" font-size="13" font-weight="800" text-anchor="middle">Agent 3 · 검증</text>
  <text x="570" y="258" fill="#9aa4bd" font-size="11" text-anchor="middle">role / goal / backstory</text>
  <text x="570" y="274" fill="#9aa4bd" font-size="11" text-anchor="middle">Task 3</text>

  <rect x="690" y="210" width="160" height="72" rx="9" fill="#1f2a12" stroke="#a3e635" stroke-width="1.6"/>
  <text x="770" y="242" fill="#a3e635" font-size="13" font-weight="800" text-anchor="middle">Crew</text>
  <text x="770" y="264" fill="#9aa4bd" font-size="11" text-anchor="middle">순서·협업 관리</text>

  <!-- Layer 3: 데이터·외부 -->
  <rect x="30" y="320" width="840" height="72" rx="10" fill="#12141c" stroke="#3a3f4e" stroke-width="1.5"/>
  <text x="46" y="344" fill="#8792ad" font-size="11" font-weight="700">③ 데이터 · 외부 서비스</text>

  <rect x="80" y="352" width="200" height="30" rx="7" fill="#1a1e2a" stroke="#5d6478" stroke-width="1.5"/>
  <text x="180" y="372" fill="#c4c9d8" font-size="12" text-anchor="middle">fashion_data.csv (자체 데이터)</text>

  <rect x="330" y="352" width="200" height="30" rx="7" fill="#1a1e2a" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="430" y="372" fill="#fbbf24" font-size="12" text-anchor="middle">OpenAI API (외부·점선)</text>

  <rect x="580" y="352" width="200" height="30" rx="7" fill="#1a1e2a" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="680" y="372" fill="#fbbf24" font-size="12" text-anchor="middle">검색 도구 (외부·점선)</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8792ad"/>
    </marker>
  </defs>
  <line x1="450" y1="152" x2="450" y2="168" stroke="#8792ad" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="450" y1="300" x2="450" y2="316" stroke="#8792ad" stroke-width="2" marker-end="url(#ah2)"/>

  <text x="620" y="150" fill="#a3e635" font-size="11.5" font-weight="700">점선 = 빌려 쓰는 것, 실선 = 우리가 만든 것</text>
</svg>
