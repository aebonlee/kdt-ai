<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#0d1020"/>
  <text x="30" y="40" fill="#e8eaf0" font-size="18" font-weight="800">파이프라인 — 무엇이 어떤 순서로 흘러가나</text>
  <text x="30" y="64" fill="#9aa4bd" font-size="13">상자 = 단계 · 화살표 = 이동 · 화살표 위 라벨 = 흐르는 데이터</text>

  <!-- 입력 -->
  <rect x="30" y="110" width="120" height="64" rx="10" fill="#12141c" stroke="#5d6478" stroke-width="1.5"/>
  <text x="90" y="140" fill="#c4c9d8" font-size="13" font-weight="700" text-anchor="middle">사용자 요청</text>
  <text x="90" y="159" fill="#8792ad" font-size="11" text-anchor="middle">입력</text>

  <!-- 단계 1 -->
  <rect x="215" y="110" width="130" height="64" rx="10" fill="#0e2a33" stroke="#22d3ee" stroke-width="2"/>
  <text x="280" y="139" fill="#22d3ee" font-size="13.5" font-weight="800" text-anchor="middle">Agent 1</text>
  <text x="280" y="158" fill="#c4c9d8" font-size="11.5" text-anchor="middle">요구 분석</text>

  <!-- 단계 2 -->
  <rect x="410" y="110" width="130" height="64" rx="10" fill="#0e2a33" stroke="#22d3ee" stroke-width="2"/>
  <text x="475" y="139" fill="#22d3ee" font-size="13.5" font-weight="800" text-anchor="middle">Agent 2</text>
  <text x="475" y="158" fill="#c4c9d8" font-size="11.5" text-anchor="middle">초안 생성</text>

  <!-- 단계 3 -->
  <rect x="605" y="110" width="130" height="64" rx="10" fill="#0e2a33" stroke="#22d3ee" stroke-width="2"/>
  <text x="670" y="139" fill="#22d3ee" font-size="13.5" font-weight="800" text-anchor="middle">Agent 3</text>
  <text x="670" y="158" fill="#c4c9d8" font-size="11.5" text-anchor="middle">품질 검증</text>

  <!-- 산출물 -->
  <rect x="800" y="110" width="80" height="64" rx="10" fill="#1f2a12" stroke="#a3e635" stroke-width="2"/>
  <text x="840" y="140" fill="#a3e635" font-size="12.5" font-weight="800" text-anchor="middle">최종</text>
  <text x="840" y="158" fill="#a3e635" font-size="12.5" font-weight="800" text-anchor="middle">산출물</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8792ad"/>
    </marker>
  </defs>

  <line x1="152" y1="142" x2="211" y2="142" stroke="#8792ad" stroke-width="2" marker-end="url(#ah)"/>
  <text x="181" y="132" fill="#fbbf24" font-size="10.5" text-anchor="middle">요청 텍스트</text>

  <line x1="347" y1="142" x2="406" y2="142" stroke="#8792ad" stroke-width="2" marker-end="url(#ah)"/>
  <text x="376" y="132" fill="#fbbf24" font-size="10.5" text-anchor="middle">요구 JSON</text>

  <line x1="542" y1="142" x2="601" y2="142" stroke="#8792ad" stroke-width="2" marker-end="url(#ah)"/>
  <text x="571" y="132" fill="#fbbf24" font-size="10.5" text-anchor="middle">초안 결과</text>

  <line x1="737" y1="142" x2="796" y2="142" stroke="#8792ad" stroke-width="2" marker-end="url(#ah)"/>
  <text x="766" y="132" fill="#fbbf24" font-size="10.5" text-anchor="middle">검증 통과분</text>

  <text x="30" y="230" fill="#a3e635" font-size="12.5" font-weight="700">✔ 좋은 예 — 흐름이 왼쪽→오른쪽 한 방향, 화살표마다 "무엇이" 이동하는지 적혀 있다</text>
  <text x="30" y="256" fill="#fb7185" font-size="12.5" font-weight="700">✘ 나쁜 예 — 상자만 나열하고 화살표에 라벨이 없으면 "관련 있음"으로만 읽힌다</text>
  <text x="30" y="280" fill="#8792ad" font-size="11.5">CrewAI에서는 Task를 정의한 순서가 곧 이 파이프라인이 됩니다.</text>
</svg>
