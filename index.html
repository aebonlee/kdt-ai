    <script>
      // 테마 초기화 (깜빡임 방지) — 기본 다크(디자인 기본), 저장값 우선
      // ⚠ 키는 ThemeToggle 저장 키와 반드시 동일('kdt-theme')해야 유지된다.
      (function () {
        try {
          var t = localStorage.getItem('kdt-theme') || 'dark'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <script>
      // SPA 경로 복원 (GitHub Pages 404.html 폴백과 연동)
      // 404.html이 '/?/prep' 형태로 보낸 경로를 원래 URL(/prep)로 되돌린다.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
