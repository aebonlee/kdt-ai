<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="460" fill="#0d1020"/>
  <text x="30" y="40" fill="#e8eaf0" font-size="18" font-weight="800">와이어프레임 — 화면이 어떻게 생겼나</text>
  <text x="30" y="64" fill="#9aa4bd" font-size="13">색·아이콘은 넣지 않고 뼈대만 · 단, 버튼과 문구는 실제 텍스트로 적는다</text>

  <!-- 브라우저 프레임 -->
  <rect x="30" y="90" width="540" height="336" rx="10" fill="#12141c" stroke="#5d6478" stroke-width="2"/>
  <line x1="30" y1="122" x2="570" y2="122" stroke="#5d6478" stroke-width="1.5"/>
  <circle cx="50" cy="106" r="5" fill="#3a3f4e"/>
  <circle cx="68" cy="106" r="5" fill="#3a3f4e"/>
  <circle cx="86" cy="106" r="5" fill="#3a3f4e"/>

  <!-- 헤더 -->
  <rect x="50" y="140" width="180" height="24" rx="4" fill="#222634"/>
  <text x="140" y="157" fill="#c4c9d8" font-size="12.5" font-weight="700" text-anchor="middle">AI 코디 추천</text>
  <rect x="470" y="140" width="80" height="24" rx="4" fill="#222634"/>
  <text x="510" y="157" fill="#8792ad" font-size="11.5" text-anchor="middle">로그인</text>

  <!-- 입력 영역 -->
  <rect x="50" y="182" width="500" height="58" rx="6" fill="none" stroke="#3a3f4e" stroke-width="1.5"/>
  <rect x="66" y="198" width="330" height="26" rx="4" fill="#1a1e2a" stroke="#3a3f4e" stroke-width="1"/>
  <text x="78" y="216" fill="#8792ad" font-size="11.5">오늘 날씨·일정을 입력하세요</text>
  <rect x="410" y="196" width="124" height="30" rx="5" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="472" y="216" fill="#22d3ee" font-size="12" font-weight="800" text-anchor="middle">코디 추천받기</text>

  <!-- 결과 카드 3장 -->
  <text x="50" y="266" fill="#8792ad" font-size="11.5" font-weight="700">추천 결과</text>
  <rect x="50" y="276" width="156" height="130" rx="6" fill="none" stroke="#3a3f4e" stroke-width="1.5"/>
  <rect x="64" y="290" width="128" height="56" rx="4" fill="#1a1e2a"/>
  <text x="128" y="324" fill="#5d6478" font-size="11" text-anchor="middle">이미지 자리</text>
  <rect x="64" y="356" width="100" height="12" rx="3" fill="#222634"/>
  <rect x="64" y="374" width="128" height="10" rx="3" fill="#1a1e2a"/>
  <text x="64" y="400" fill="#8792ad" font-size="10.5">추천 이유 1줄</text>

  <rect x="222" y="276" width="156" height="130" rx="6" fill="none" stroke="#3a3f4e" stroke-width="1.5"/>
  <rect x="236" y="290" width="128" height="56" rx="4" fill="#1a1e2a"/>
  <text x="300" y="324" fill="#5d6478" font-size="11" text-anchor="middle">이미지 자리</text>
  <rect x="236" y="356" width="100" height="12" rx="3" fill="#222634"/>
  <rect x="236" y="374" width="128" height="10" rx="3" fill="#1a1e2a"/>
  <text x="236" y="400" fill="#8792ad" font-size="10.5">추천 이유 1줄</text>

  <rect x="394" y="276" width="156" height="130" rx="6" fill="none" stroke="#3a3f4e" stroke-width="1.5"/>
  <rect x="408" y="290" width="128" height="56" rx="4" fill="#1a1e2a"/>
  <text x="472" y="324" fill="#5d6478" font-size="11" text-anchor="middle">이미지 자리</text>
  <rect x="408" y="356" width="100" height="12" rx="3" fill="#222634"/>
  <rect x="408" y="374" width="128" height="10" rx="3" fill="#1a1e2a"/>
  <text x="408" y="400" fill="#8792ad" font-size="10.5">추천 이유 1줄</text>

  <!-- 오른쪽 설명 -->
  <text x="610" y="150" fill="#a3e635" font-size="13" font-weight="800">이렇게 그리세요</text>
  <text x="610" y="176" fill="#c4c9d8" font-size="12">· 회색 상자와 선만 사용</text>
  <text x="610" y="198" fill="#c4c9d8" font-size="12">· 이미지는 "이미지 자리"로 표시</text>
  <text x="610" y="220" fill="#c4c9d8" font-size="12">· 버튼 문구는 실제 텍스트로</text>
  <text x="610" y="242" fill="#c4c9d8" font-size="12">  ("확인"(×) → "코디 추천받기"(○))</text>

  <text x="610" y="286" fill="#fb7185" font-size="13" font-weight="800">이건 하지 마세요</text>
  <text x="610" y="312" fill="#c4c9d8" font-size="12">· 색·그라데이션·아이콘 꾸미기</text>
  <text x="610" y="334" fill="#c4c9d8" font-size="12">· 실제 사진 붙여 넣기</text>
  <text x="610" y="356" fill="#c4c9d8" font-size="12">· 화면 5장 이상 그리기</text>
  <text x="610" y="378" fill="#8792ad" font-size="11.5">   → 핵심 1장이면 충분합니다</text>

  <text x="30" y="446" fill="#8792ad" font-size="11.5">뼈대만 그리는 이유 — 디자인을 논의하는 자리가 아니라 "무엇을 보여 줄 것인가"를 합의하는 그림이기 때문입니다.</text>
</svg>
