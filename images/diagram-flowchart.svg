<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="520" fill="#0d1020"/>
  <text x="30" y="40" fill="#e8eaf0" font-size="18" font-weight="800">순서도 — 판단과 분기가 있는 로직</text>
  <text x="30" y="64" fill="#9aa4bd" font-size="13">타원 = 시작·끝 · 사각형 = 처리 · 마름모 = 판단(예/아니오 라벨 필수) · 흐름은 위→아래</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8792ad"/>
    </marker>
  </defs>

  <!-- 시작 -->
  <ellipse cx="330" cy="115" rx="86" ry="26" fill="#12141c" stroke="#a3e635" stroke-width="2"/>
  <text x="330" y="121" fill="#a3e635" font-size="13.5" font-weight="800" text-anchor="middle">시작 · 요청 접수</text>

  <line x1="330" y1="141" x2="330" y2="166" stroke="#8792ad" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- 처리 1 -->
  <rect x="234" y="170" width="192" height="50" rx="8" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.8"/>
  <text x="330" y="200" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">Agent 1 — 요구 분석</text>

  <line x1="330" y1="220" x2="330" y2="245" stroke="#8792ad" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- 처리 2 -->
  <rect x="234" y="249" width="192" height="50" rx="8" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.8"/>
  <text x="330" y="279" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">Agent 2 — 초안 생성</text>

  <line x1="330" y1="299" x2="330" y2="324" stroke="#8792ad" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- 판단 (마름모) -->
  <path d="M330,328 L456,388 L330,448 L204,388 Z" fill="#2a2410" stroke="#fbbf24" stroke-width="2"/>
  <text x="330" y="383" fill="#fbbf24" font-size="13" font-weight="800" text-anchor="middle">품질 기준</text>
  <text x="330" y="402" fill="#fbbf24" font-size="13" font-weight="800" text-anchor="middle">충족?</text>

  <!-- 아니오 → 되돌아가기 (왼쪽 루프) -->
  <path d="M204,388 L120,388 L120,274 L230,274" fill="none" stroke="#fb7185" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="120" y="335" fill="#fb7185" font-size="12" font-weight="800" text-anchor="middle">아니오</text>
  <text x="120" y="352" fill="#fb7185" font-size="11" text-anchor="middle">재생성</text>

  <!-- 예 → 오른쪽으로 -->
  <line x1="456" y1="388" x2="524" y2="388" stroke="#8792ad" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="490" y="378" fill="#a3e635" font-size="12" font-weight="800" text-anchor="middle">예</text>

  <!-- 처리 3 -->
  <rect x="528" y="363" width="180" height="50" rx="8" fill="#0e2a33" stroke="#22d3ee" stroke-width="1.8"/>
  <text x="618" y="393" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">결과 정리·출력</text>

  <line x1="708" y1="388" x2="742" y2="388" stroke="#8792ad" stroke-width="2" marker-end="url(#ah3)"/>

  <!-- 끝 -->
  <ellipse cx="812" cy="388" rx="62" ry="26" fill="#12141c" stroke="#a3e635" stroke-width="2"/>
  <text x="812" y="394" fill="#a3e635" font-size="13.5" font-weight="800" text-anchor="middle">끝</text>

  <text x="530" y="130" fill="#a3e635" font-size="12.5" font-weight="700">✔ 마름모에서 나가는 화살표에는</text>
  <text x="530" y="150" fill="#a3e635" font-size="12.5" font-weight="700">   반드시 예 / 아니오를 쓴다</text>
  <text x="530" y="178" fill="#fb7185" font-size="12.5" font-weight="700">✘ 라벨 없는 분기는 읽는 사람이</text>
  <text x="530" y="198" fill="#fb7185" font-size="12.5" font-weight="700">   어느 쪽이 실패인지 알 수 없다</text>
  <text x="530" y="232" fill="#8792ad" font-size="11.5">되돌아가는 화살표(재시도 루프)를</text>
  <text x="530" y="250" fill="#8792ad" font-size="11.5">그려 두면 기술 이해도 점수에서 강합니다.</text>

  <text x="30" y="492" fill="#8792ad" font-size="11.5">흐름은 위→아래 한 방향으로 유지하고, 되돌아가는 선만 예외로 옆으로 빼면 깔끔합니다.</text>
</svg>
